apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// Monorepo: Expo app in apps/mobile; deps hoisted to repo root. Repo root = parent of android/ (rootProject.projectDir).
def repoRootFile = rootProject.projectDir.getParentFile()
def repoRoot = repoRootFile.getAbsolutePath().replace('\\', '/')
def projectRoot = repoRoot + "/apps/mobile"
def appRoot = file("${repoRoot}/apps/mobile")
def nodeCwd = repoRootFile  // run node from repo root so hoisted node_modules are found
def exeNode = { String script ->
    def proc = ["node", "--print", script].execute(null, nodeCwd)
    proc.waitForOrKill(10000)
    proc.text?.trim() ?: ""
}
def expoPkgPath = exeNode("require.resolve('expo/package.json')")
def expoDir = expoPkgPath ? new File(expoPkgPath).getParentFile() : null
def resolveAppEntryScript = (expoDir != null ? expoDir.absolutePath.replace('\\', '/') : repoRoot + "/node_modules/expo") + "/scripts/resolveAppEntry.js"
def reactNativePkgPath = exeNode("require.resolve('react-native/package.json')")
def reactNativeDirFile = reactNativePkgPath ? new File(reactNativePkgPath).getParentFile() : null
def reactNativeDirPath = (reactNativeDirFile != null ? reactNativeDirFile.absolutePath.replace('\\', '/') : repoRoot + "/node_modules/react-native")
def codegenPkgPath = exeNode("require.resolve('@react-native/codegen/package.json', { paths: [require.resolve('react-native/package.json')] })")
def codegenDirFile = codegenPkgPath ? new File(codegenPkgPath).getParentFile() : null
def codegenDirPath = (codegenDirFile != null ? codegenDirFile.absolutePath.replace('\\', '/') : repoRoot + "/node_modules/@react-native/codegen")
def cliPath = exeNode("require.resolve('@expo/cli', { paths: [require.resolve('expo/package.json')] })")
def cliResolved = cliPath ?: (repoRoot + "/node_modules/@expo/cli")
def cliDir = cliResolved.endsWith(".json") ? new File(cliResolved).getParentFile().absolutePath : cliResolved
// Resolve cli-platform-android via Node so we get the package that actually contains native_modules.gradle (may be nested under react-native)
def cliPlatformAndroidPkg = exeNode("require.resolve('@react-native-community/cli-platform-android/package.json', { paths: [require.resolve('react-native/package.json')] })")
def cliPlatformAndroidDirFile = cliPlatformAndroidPkg ? new File(cliPlatformAndroidPkg).getParentFile() : new File(repoRootFile, "node_modules/@react-native-community/cli-platform-android")

react {
    root = appRoot
    def entryPath = ["node", resolveAppEntryScript, projectRoot, "android", "absolute"].execute(null, nodeCwd).text?.trim() ?: ""
    entryFile = file(entryPath ?: "${repoRoot}/node_modules/expo-router/entry.js")
    reactNativeDir = file(reactNativeDirPath)
    hermesCommand = reactNativeDirPath + "/sdks/hermesc/%OS-BIN%/hermesc"
    codegenDir = file(codegenDirPath)
    cliFile = file(cliDir)
    bundleCommand = "export:embed"
}

def enableProguardInReleaseBuilds = (findProperty('android.enableProguardInReleaseBuilds') ?: false).toBoolean()
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace 'com.optionsplungellc.chartsignl'
    
    defaultConfig {
        applicationId 'com.optionsplungellc.chartsignl'
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 26
        versionName "1.0.26"
        buildConfigField("boolean", "REACT_NATIVE_UNSTABLE_USE_RUNTIME_SCHEDULER_ALWAYS", (findProperty("reactNative.unstable_useRuntimeSchedulerAlways") ?: true).toString())

        resConfigs "en"  // Only include English, filters out cb, fb
    }
    
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // CRITICAL: Must have release keystore configured
            def keystorePropertiesFile = rootProject.file("gradle.properties")
            def hasReleaseConfig = project.hasProperty('CHARTSIGNL_RELEASE_STORE_FILE')
            
            if (!hasReleaseConfig) {
                throw new GradleException("Release keystore not configured! Check gradle.properties")
            }
            
            storeFile file(CHARTSIGNL_RELEASE_STORE_FILE)
            storePassword CHARTSIGNL_RELEASE_STORE_PASSWORD
            keyAlias CHARTSIGNL_RELEASE_KEY_ALIAS
            keyPassword CHARTSIGNL_RELEASE_KEY_PASSWORD
        }
    }
    
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // CRITICAL: Must use release signing config
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            
            // Ensure we're not accidentally using debug
            debuggable false
            jniDebuggable false
            renderscriptDebuggable false
        }
    }
    
    packagingOptions {
        jniLibs {
            useLegacyPackaging (findProperty('expo.useLegacyPackaging')?.toBoolean() ?: false)
        }
    }
}

// Apply static values from `gradle.properties` to the `android.packagingOptions`
["pickFirsts", "excludes", "merges", "doNotStrip"].each { prop ->
    def options = (findProperty("android.packagingOptions.$prop") ?: "").split(",");
    for (i in 0..<options.size()) options[i] = options[i].trim();
    options -= ""

    if (options.length > 0) {
        println "android.packagingOptions.$prop += $options ($options.length)"
        options.each {
            android.packagingOptions[prop] += it
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("androidx.activity:activity-ktx:1.9.0")

    // Force Play Billing Library 6+ (required by Google Play; RevenueCat uses it transitively)
    implementation("com.android.billingclient:billing:6.1.0")

    def isGifEnabled = (findProperty('expo.gif.enabled') ?: "") == "true";
    def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "") == "true";
    def isWebpAnimatedEnabled = (findProperty('expo.webp.animated') ?: "") == "true";

    if (isGifEnabled) {
        implementation("com.facebook.fresco:animated-gif:${reactAndroidLibs.versions.fresco.get()}")
    }

    if (isWebpEnabled) {
        implementation("com.facebook.fresco:webpsupport:${reactAndroidLibs.versions.fresco.get()}")
        if (isWebpAnimatedEnabled) {
            implementation("com.facebook.fresco:animated-webp:${reactAndroidLibs.versions.fresco.get()}")
        }
    }

    implementation("com.facebook.react:flipper-integration")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: new File(cliPlatformAndroidDirFile, "native_modules.gradle")
applyNativeModulesAppBuildGradle(project)
