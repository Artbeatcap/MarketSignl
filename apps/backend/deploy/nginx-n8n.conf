# Nginx configuration for n8n (workflow automation)
# Place this in /etc/nginx/sites-available/n8n.chartsignl.com
# Then symlink: ln -s /etc/nginx/sites-available/n8n.chartsignl.com /etc/nginx/sites-enabled/
# Get cert: certbot certonly --nginx -d n8n.chartsignl.com

server {
    listen 80;
    listen [::]:80;
    server_name n8n.chartsignl.com;

    # Allow certbot challenges
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        allow all;
    }

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name n8n.chartsignl.com;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/n8n.chartsignl.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.chartsignl.com/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy to n8n (UI + webhooks)
    location / {
        proxy_pass http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
